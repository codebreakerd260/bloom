<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Bloom 🌱 (3D + AI)</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Import Map for ESM dependencies -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "three": "https://esm.sh/three@0.158.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.11?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.88.17?external=react,react-dom,three,@react-three/fiber",
        "@google/generative-ai": "https://esm.sh/@google/generative-ai"
      }
    }
  </script>

  <!-- Babel standalone for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-green-50 m-0 p-0 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas } from '@react-three/fiber';
    import { OrbitControls, Sky, Html } from '@react-three/drei';
    import { GoogleGenerativeAI } from '@google/generative-ai';
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

    env.allowLocalModels = false;

    // --- Upgraded 3D Plant Components ---

    // A pulsing, swaying animated material specifically for leaves/grass
    function PlantMaterial({ color }) {
      return (
        <meshStandardMaterial
          color={color}
          roughness={0.8}
          metalness={0.1}
        />
      );
    }

    // A generic wrapper to handle interaction logic for all plants
    function InteractivePlant({ position, plantData, onPlayTTS, offsetY = 2.5, children }) {
      const [hovered, setHovered] = useState(false);

      useEffect(() => {
        document.body.style.cursor = hovered ? 'pointer' : 'auto';
      }, [hovered]);

      return (
        <group
          position={position}
          onPointerOver={(e) => { e.stopPropagation(); setHovered(true); }}
          onPointerOut={(e) => { e.stopPropagation(); setHovered(false); }}
          onClick={(e) => { e.stopPropagation(); if (plantData.message) onPlayTTS(plantData.message); }}
        >
          {children}

          {hovered && plantData.entry && (
            <Html position={[0, offsetY, 0]} center style={{ pointerEvents: 'none' }}>
              <div className="bg-black/70 backdrop-blur text-white px-4 py-2 rounded-xl text-sm max-w-xs text-center shadow-lg transform -translate-y-full mb-2 opacity-100 transition-opacity whitespace-pre-wrap">
                <p className="font-medium italic">"{plantData.entry}"</p>
                <div className="text-xs text-white/50 mt-1 flex items-center justify-center gap-1">
                  <span>🎵</span> Click to hear message
                </div>
              </div>
            </Html>
          )}
        </group>
      );
    }

    function Sunflower({ position, plantData, onPlayTTS }) {
      const rotY = React.useMemo(() => Math.random() * Math.PI * 2, []);
      return (
        <InteractivePlant position={position} plantData={plantData} onPlayTTS={onPlayTTS} offsetY={0.3}>
          <group scale={[0.7, 0.7, 0.7]} rotation={[0, rotY, 0]}>
            {/* Stem */}
            <mesh position={[0, 1.3, 0]}>
              <cylinderGeometry args={[0.08, 0.12, 3]} />
              <PlantMaterial color="#3b821d" />
            </mesh>
            {/* Leaves */}
            <mesh position={[0.2, 1, 0]} rotation={[0, 0, -Math.PI / 4]}>
              <coneGeometry args={[0.3, 0.8]} />
              <PlantMaterial color="#4caf50" />
            </mesh>
            <mesh position={[-0.2, 1.5, 0]} rotation={[0, 0, Math.PI / 4]}>
              <coneGeometry args={[0.25, 0.6]} />
              <PlantMaterial color="#4caf50" />
            </mesh>
            {/* Flower Head */}
            <group position={[0, 3, 0]} rotation={[Math.PI / 6, 0, 0]}>
              {/* Center Disk */}
              <mesh position={[0, 0, 0.1]} rotation={[Math.PI / 2, 0, 0]}>
                <cylinderGeometry args={[0.4, 0.4, 0.1]} />
                <meshStandardMaterial color="#4e342e" roughness={1} />
              </mesh>
              {/* Petals arranged in a circle */}
              {Array.from({ length: 16 }).map((_, i) => (
                <mesh key={i} position={[Math.sin((i / 16) * Math.PI * 2) * 0.5, Math.cos((i / 16) * Math.PI * 2) * 0.5, 0.05]} rotation={[0, 0, (-i / 16) * Math.PI * 2]}>
                  <sphereGeometry args={[0.15, 8, 8]} scale={[1, 2.5, 0.2]} />
                  <meshStandardMaterial color="#ffc107" roughness={0.4} />
                </mesh>
              ))}
            </group>
          </group>
        </InteractivePlant>
      );
    }

    function Fern({ position, plantData, onPlayTTS }) {
      const fronds = React.useMemo(() => {
        return Array.from({ length: 9 }).map((_, i) => ({
          angle: (i / 9) * Math.PI * 2,
          arch: Math.PI / 4 + Math.random() * 0.2,
          size: 0.8 + Math.random() * 0.4
        }));
      }, []);

      return (
        <InteractivePlant position={position} plantData={plantData} onPlayTTS={onPlayTTS} offsetY={0.2}>
          <group scale={[0.7, 0.7, 0.7]}>
            {/* Multiple fronds arching outwards */}
            {fronds.map((frond, i) => (
              <group key={i} rotation={[0, frond.angle, 0]}>
                <mesh position={[0, frond.size, frond.size / 2]} rotation={[frond.arch, 0, 0]}>
                  <cylinderGeometry args={[0.02, 0.1, frond.size * 2]} />
                  <PlantMaterial color="#2e7d32" />
                </mesh>
              </group>
            ))}
          </group>
        </InteractivePlant>
      );
    }

    function Tulip({ position, plantData, onPlayTTS }) {
      const colors = ["#e91e63", "#ff9800", "#f44336", "#9c27b0"];
      const color = React.useMemo(() => colors[Math.floor(Math.random() * colors.length)], []);
      return (
        <InteractivePlant position={position} plantData={plantData} onPlayTTS={onPlayTTS} offsetY={0.2}>
          <group scale={[0.8, 0.8, 0.8]}>
            {/* Stem */}
            <mesh position={[0, 0.8, 0]}>
              <cylinderGeometry args={[0.04, 0.06, 1.6]} />
              <PlantMaterial color="#66bb6a" />
            </mesh>
            {/* Long thin leaf */}
            <mesh position={[0.1, 0.5, 0]} rotation={[0, 0, -Math.PI / 6]}>
              <cylinderGeometry args={[0.02, 0.1, 1]} />
              <PlantMaterial color="#4caf50" />
            </mesh>
            {/* Tulip Cup / Bulb */}
            <mesh position={[0, 1.7, 0]}>
              <cylinderGeometry args={[0.25, 0.1, 0.5, 16, 1, false, 0, Math.PI * 2]} />
              <meshStandardMaterial color={color} roughness={0.3} metalness={0.1} />
            </mesh>
            {/* Inner bulb light */}
            <mesh position={[0, 1.6, 0]}>
              <sphereGeometry args={[0.15]} />
              <meshStandardMaterial color="#ffffff" emissive="#ffea00" emissiveIntensity={0.2} />
            </mesh>
          </group>
        </InteractivePlant>
      );
    }

    function Tree({ position, plantData, onPlayTTS }) {
      const s = React.useMemo(() => 1.5 + Math.random() * 0.8, []);
      return (
        <InteractivePlant position={position} plantData={plantData} onPlayTTS={onPlayTTS} offsetY={0.6 * s}>
          <group scale={[s, s, s]}>
            {/* Trunk */}
            <mesh position={[0, 1.5, 0]} castShadow>
              <cylinderGeometry args={[0.4, 0.6, 3]} />
              <meshStandardMaterial color="#5d4037" roughness={0.9} />
            </mesh>
            {/* Main Canopy */}
            <mesh position={[0, 3.5, 0]} castShadow>
              <dodecahedronGeometry args={[2, 1]} />
              <PlantMaterial color="#388e3c" />
            </mesh>
            {/* Side bushs for organic look */}
            <mesh position={[1, 3, 0.5]} castShadow>
              <dodecahedronGeometry args={[1.2, 1]} />
              <PlantMaterial color="#43a047" />
            </mesh>
            <mesh position={[-0.8, 3.2, -0.8]} castShadow>
              <dodecahedronGeometry args={[1.5, 1]} />
              <PlantMaterial color="#2e7d32" />
            </mesh>
          </group>
        </InteractivePlant>
      );
    }

    function Grass({ position, plantData, onPlayTTS }) {
      const blades = React.useMemo(() => {
        return Array.from({ length: 5 }).map((_, i) => ({
          pos: [(Math.random() - 0.5) * 0.3, 0.2, (Math.random() - 0.5) * 0.3],
          rot: [0, Math.random() * Math.PI, (Math.random() - 0.5) * 0.5],
          scale: 0.4 + Math.random() * 0.3
        }));
      }, []);

      return (
        <InteractivePlant position={position} plantData={plantData} onPlayTTS={onPlayTTS} offsetY={0.1}>
          <group>
            {blades.map((blade, i) => (
              <mesh key={i} position={blade.pos} rotation={blade.rot}>
                <coneGeometry args={[0.05, blade.scale]} />
                <PlantMaterial color="#81c784" />
              </mesh>
            ))}
          </group>
        </InteractivePlant>
      );
    }

    function Garden({ plants, onPlayTTS }) {
      return (
        <Canvas camera={{ position: [0, 5, 15], fov: 50 }}>
          <Sky sunPosition={[100, 20, 100]} />
          <ambientLight intensity={0.5} />
          <pointLight position={[10, 10, 10]} />
          <OrbitControls />
          <mesh rotation={[-Math.PI / 2, 0, 0]} position={[0, 0, 0]}>
            <planeGeometry args={[30, 30]} />
            <meshStandardMaterial color="#3d5c3a" />
          </mesh>
          {plants.map((plant, i) => {
            const PlantModel = {
              sunflower: Sunflower,
              fern: Fern,
              tulip: Tulip,
              tree: Tree,
              grass: Grass
            }[plant.type] || Grass;
            return <PlantModel key={i} position={plant.position} plantData={plant} onPlayTTS={onPlayTTS} />;
          })}
        </Canvas>
      );
    }

    // --- Main App Component ---
    function App() {
      // Preload a small beautiful starter garden
      const [plants, setPlants] = useState([
        { type: "tree", position: [-5, 0, -4], entry: "I am grateful for the deep roots of my family.", message: "Roots hold us steady during storms." },
        { type: "sunflower", position: [-2, 0, -2], entry: "So thankful for the warm sunshine today.", message: "The sun brings warmth to every soul." },
        { type: "tulip", position: [3, 0, -1], entry: "I loved the bright colors of the sky this morning.", message: "Beauty is all around us." },
        { type: "fern", position: [4, 0, -4], entry: "Grateful for quiet, peaceful moments to myself.", message: "Quiet moments restore the spirit." },
        { type: "grass", position: [-1, 0, 2], entry: "Appreciating the simple feeling of grass under my feet.", message: "Simple joys are the best joys." },
        { type: "grass", position: [2, 0, 3], entry: "A good walk in the park.", message: "Nature heals the mind." },
      ]);
      const [entry, setEntry] = useState("");
      const [geminiKey, setGeminiKey] = useState("");
      const [isRecording, setIsRecording] = useState(false);
      const [status, setStatus] = useState("Ready");

      const transcriberRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);

      useEffect(() => {
        // Initialize Whisper from HuggingFace via Transformers.js
        setStatus("Loading Whisper STT (may take slightly long initially)...");
        pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en')
          .then(t => {
            transcriberRef.current = t;
            setStatus("Ready");
          })
          .catch(e => {
            console.error(e);
            setStatus("Whisper STT failed. Check console.");
          });
      }, []);

      const startRecording = async () => {
        if (!navigator.mediaDevices) {
          alert("Media devices not supported in this browser.");
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorderRef.current = new MediaRecorder(stream);
          mediaRecorderRef.current.ondataavailable = e => {
            audioChunksRef.current.push(e.data);
          };
          mediaRecorderRef.current.onstop = async () => {
            setStatus("Transcribing audio...");
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/wav' });
            audioChunksRef.current = [];

            if (transcriberRef.current) {
              const arrayBuffer = await audioBlob.arrayBuffer();
              const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
              const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
              const float32Array = audioBuffer.getChannelData(0);

              try {
                const result = await transcriberRef.current(float32Array);
                setEntry(prev => (prev + " " + result.text).trim());
                setStatus("Ready");
              } catch (err) {
                console.error("Transcription error", err);
                setStatus("Transcription failed.");
              }
            } else {
              setStatus("Transcriber object is not loaded yet.");
            }
          };
          audioChunksRef.current = [];
          mediaRecorderRef.current.start();
          setIsRecording(true);
          setStatus("Recording...");
        } catch (err) {
          console.error("Microphone error", err);
          setStatus("Microphone access denied.");
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const playPiperTTS = async (text) => {
        setStatus("Playing TTS...");
        try {
          // Attempt to call local Piper TTS server to conform to instructions
          const controller = new AbortController();
          // Timeout to avoid blocking on fetch if Piper is not actually running
          const timeoutId = setTimeout(() => controller.abort(), 1000);
          const res = await fetch(`http://localhost:5050/api/tts?text=${encodeURIComponent(text)}`, { signal: controller.signal });
          clearTimeout(timeoutId);
          if (res.ok) {
            const audioBlob = await res.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play();
            setStatus("Ready");
            return;
          }
        } catch (e) {
          console.log("Local Piper TTS unavailable, falling back to Web Speech API");
        }

        // Fallback to Web Speech API
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.onend = () => setStatus("Ready");
        window.speechSynthesis.speak(utterance);
      };

      const growPlant = async () => {
        if (!entry.trim()) return;
        if (!geminiKey) {
          alert("Please enter a Gemini API Key to continue!");
          return;
        }

        setStatus("Analyzing sentiment via Gemini...");

        try {
          const genAI = new GoogleGenerativeAI(geminiKey);
          const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
          const prompt = `Analyze this gratitude journal entry: "${entry}". 
          Return ONLY a JSON object with two fields (do not wrap in markdown tags like \`\`\`json): 
          {
            "type": one of ["sunflower", "fern", "tulip", "tree", "grass"] based on sentiment/meaning,
            "message": "A beautiful, poetic, and highly personalized 2-3 sentence response that deeply reflects on the user's gratitude and offers profound encouragement."
          }`;

          const result = await model.generateContent(prompt);
          let responseText = result.response.text().trim();

          if (responseText.startsWith('```json')) {
            responseText = responseText.replace(/```json/, '').replace(/```/, '').trim();
          } else if (responseText.startsWith('```')) {
            responseText = responseText.replace(/```/, '').replace(/```/, '').trim();
          }

          const data = JSON.parse(responseText);

          const x = (Math.random() - 0.5) * 20;
          const z = (Math.random() - 0.5) * 20;

          setPlants(prev => [...prev, { type: data.type, position: [x, 0, z] }]);
          playPiperTTS(data.message);

          setEntry("");
        } catch (err) {
          console.error("Gemini Error:", err);

          // Check for Quota/Rate Limit Errors (429)
          if (err.message && err.message.includes("429")) {
            setStatus("Gemini Quota Exceeded. Falling back to local analysis...");
            console.log("Using offline fallback logic due to API limit.");

            // Fallback offline logic
            const text = entry.toLowerCase();
            let type = "grass";
            let message = "A lovely thought to ground you today.";

            if (text.includes("friend") || text.includes("family")) {
              type = "sunflower";
              message = "Relationships bring such bright warmth to our lives.";
            } else if (text.includes("peace") || text.includes("quiet") || text.includes("calm")) {
              type = "fern";
              message = "Embrace this quiet serenity.";
            } else if (text.includes("happy") || text.includes("joy") || text.includes("love")) {
              type = "tulip";
              message = "Joy is blooming beautifully within you.";
            } else if (text.includes("nature") || text.includes("sun") || text.includes("walk")) {
              type = "tree";
              message = "Nature grounds us and helps us grow strong branches.";
            }

            const x = (Math.random() - 0.5) * 20;
            const z = (Math.random() - 0.5) * 20;
            setTimeout(() => {
              setPlants(prev => [...prev, { type, position: [x, 0, z] }]);
              playPiperTTS(message);
              setEntry("");
            }, 500);
          } else {
            setStatus("Error analyzing entry with Gemini.");
          }
        }
      };

      return (
        <div className="relative w-screen h-screen overflow-hidden">
          {/* 3D Background */}
          <div className="absolute inset-0 z-0 bg-blue-50">
            <Garden plants={plants} onPlayTTS={playPiperTTS} />
          </div>

          {/* Foreground Overlay Content (pointer-events-none so we can click the 3D garden behind it) */}
          <div className="absolute inset-0 z-10 flex flex-col items-center justify-between p-6 pointer-events-none pb-12">

            <div className="flex flex-col items-center pt-6">
              <h1 className="text-5xl font-bold mb-3 text-white drop-shadow-lg">Bloom 3D 🌱</h1>
              <p className="text-white drop-shadow-lg font-medium text-lg">Voice your gratitude. Watch your 3D garden grow.</p>
            </div>

            {/* Glassmorphic Card (pointer-events-auto so we can click inputs inside the card) */}
            <div className="flex flex-col gap-4 w-full max-w-md p-6 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] backdrop-blur-xl bg-white/20 border border-white/30 pointer-events-auto">
              <input
                type="password"
                placeholder="Gemini API Key"
                value={geminiKey}
                onChange={e => setGeminiKey(e.target.value)}
                className="rounded-lg p-3 text-sm bg-white/50 placeholder-gray-600 font-medium focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/70 transition-all border border-white/50"
              />
              <textarea
                value={entry}
                onChange={e => setEntry(e.target.value)}
                className="rounded-lg p-3 w-full h-24 resize-none bg-white/50 placeholder-gray-600 font-medium focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/70 transition-all border border-white/50"
                placeholder="Today I'm grateful for..."
              />

              <div className="flex gap-3">
                <button
                  onMouseDown={startRecording}
                  onMouseUp={stopRecording}
                  onMouseLeave={stopRecording}
                  onTouchStart={startRecording}
                  onTouchEnd={stopRecording}
                  className={`flex-1 py-3 rounded-xl text-white font-semibold transition-all shadow-lg active:scale-95 ${isRecording
                    ? 'bg-red-500/90 hover:bg-red-600/90'
                    : 'bg-blue-500/90 hover:bg-blue-600/90'
                    }`}
                >
                  {isRecording ? "Listening..." : "Hold to Talk"}
                </button>

                <button
                  onClick={growPlant}
                  className="flex-1 py-3 bg-green-500/90 text-white rounded-xl font-semibold shadow-lg hover:bg-green-600/90 transition-all active:scale-95"
                >
                  Plant Seed
                </button>
              </div>

              <div className="mt-1 h-6 flex items-center justify-center bg-white/30 rounded-lg">
                <p className="text-xs text-gray-800 font-bold">{status}</p>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
